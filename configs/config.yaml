# 交通目标检测与流量预测系统 - 主配置文件
# Traffic Detection and Flow Prediction System Configuration

# 路径配置
paths:
  video_input: "data/videos"
  output: "data/output"
  traffic_data: "data/traffic_data.csv"
  models: "data/models"

# 检测配置
detection:
  model: "yolov8n.pt"  # YOLOv8 nano模型
  conf_threshold: 0.5  # 置信度阈值
  iou_threshold: 0.45  # NMS IOU阈值
  # COCO数据集车辆类别ID
  # 2: car, 3: motorcycle, 5: bus, 7: truck
  classes: [2, 3, 5, 7]
  device: "cuda"  # cuda 或 cpu

# 计数配置
counting:
  line_position: 0.5  # 检测线位置（视频高度比例，0-1）
  direction: "both"   # counting方向: up, down, both

# 预测配置
prediction:
  sequence_length: 10  # 输入序列长度
  hidden_size: 64      # LSTM隐藏层大小
  num_layers: 2        # LSTM层数
  dropout: 0.2         # Dropout比率
  learning_rate: 0.001 # 学习率
  epochs: 100          # 训练轮数
  batch_size: 32       # 批次大小

# 可视化配置
visualization:
  fps: 30              # 输出视频帧率
  show_conf: true      # 显示置信度
  show_labels: true    # 显示标签
  line_thickness: 2    # 边框线宽
